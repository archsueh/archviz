  /* === System dark auto-detect (when no data-palette set) === */

    :root:not([data-palette]):not([data-theme]) {
      --av-surface: #1a1a2e;
      --av-surface-alt: #252540;

  /* Transition theme changes smoothly */
  body,
  .root {
    transition:
      background-color 150ms ease-out,
      color 150ms ease-out,
      border-color 150ms ease-out;
  }

  /* === Toggle button === */
  #archviz-theme-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 9999;
    background: var(--av-surface-raised, #faf9f5);
    border: 1px solid var(--av-border, #d6d3d1);
    border-radius: 8px;
    padding: 6px 12px;
    font:
      12px/1 system-ui,
      -apple-system,
      sans-serif;
    color: var(--av-text-secondary, #5e5d59);
    cursor: pointer;
    transition:
      background 150ms ease-out,
      border-color 150ms ease-out,
      transform 100ms ease-out;
    user-select: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #archviz-theme-toggle:active {
    transform: scale(0.97);
  }
  @media (hover: hover) and (pointer: fine) {
    #archviz-theme-toggle:hover {
      background: var(--av-surface-alt, #e8e4e0);
      border-color: var(--av-text-tertiary, #87867f);
    }

<script>
  /* archviz-skills Theme System
   * API:
   *   applyPalette(name)  — set palette by name
   *   toggleTheme()        — toggle light↔dark
   *   getCurrentPalette()  — return current palette name
   *   isDark()             — boolean
   *   ARCHVIZ_PALETTES     — palette registry
   */
  (function () {
    "use strict";

    const PALETTES = {
      "warm-paper": { label: "Warm Paper", mode: "light" },
      "swiss-neutral": { label: "Swiss Neutral", mode: "light" },
      "editorial-parchment": { label: "Editorial", mode: "light" },
      "swiss-modernist": { label: "Swiss Modernist", mode: "light" },
      "vignelli-canon": { label: "Vignelli Canon", mode: "light" },
      "still-paper": { label: "Still Paper", mode: "light" },
      "signal-proof": { label: "Signal Proof", mode: "light" },
      "bridge-canvas": { label: "Bridge Canvas", mode: "dark" },
      "ikb-dark": { label: "IKB Dark", mode: "dark" },
      "auto-time": { label: "Auto (Time)", mode: "auto" },
    };

    // Expose globally for export module
    window.ARCHVIZ_PALETTES = PALETTES;

    let currentPalette = "warm-paper";

    function applyPalette(name) {
      if (!PALETTES[name]) return;
      currentPalette = name;
      const root = document.documentElement;
      let resolvedPalette = name;
      let activeMode = PALETTES[name].mode;

      if (name === "auto-time") {
        const hours = new Date().getHours();
        const isDaytime = hours >= 6 && hours < 18;
        resolvedPalette = isDaytime ? "still-paper" : "ikb-dark";
        activeMode = isDaytime ? "light" : "dark";
        root.setAttribute("data-palette-selection", "auto-time");
      } else {
        root.removeAttribute("data-palette-selection");
      }

      root.setAttribute("data-palette", resolvedPalette);
      root.setAttribute("data-theme", activeMode);
      localStorage.setItem("archviz-palette", name);
      updateToggleLabel();
      window.dispatchEvent(new Event("archviz-theme-changed"));
    }

    function toggleTheme() {
      const order = [
        "warm-paper",
        "swiss-neutral",
        "editorial-parchment",
        "swiss-modernist",
        "vignelli-canon",
        "still-paper",
        "signal-proof",
        "bridge-canvas",
        "ikb-dark",
        "auto-time",
      ];
      const idx = order.indexOf(currentPalette);
      applyPalette(order[(idx + 1) % order.length]);
    }

    function getCurrentPalette() {
      return currentPalette;
    }
    function isDark() {
      if (currentPalette === "auto-time") {
        const hours = new Date().getHours();
        return !(hours >= 6 && hours < 18);
      }
      return PALETTES[currentPalette]?.mode === "dark";
    }

    function updateToggleLabel() {
      const btn = document.getElementById("archviz-theme-toggle");
      if (btn)
        btn.textContent = PALETTES[currentPalette]?.label || currentPalette;
    }

    // Auto-init on DOMContentLoaded
    function init() {
      // Restore saved palette
      const saved = localStorage.getItem("archviz-palette");
      if (saved && PALETTES[saved]) {
        applyPalette(saved);
      } else {
        applyPalette("auto-time");
      }

      // Create toggle button
      const btn = document.createElement("button");
      btn.id = "archviz-theme-toggle";
      btn.textContent = PALETTES[currentPalette]?.label || "Theme";
      btn.addEventListener("click", toggleTheme);
      document.body.appendChild(btn);

      // Periodically update theme if auto-time
      setInterval(function () {
        if (currentPalette === "auto-time") {
          const hours = new Date().getHours();
          const isDaytime = hours >= 6 && hours < 18;
          const resolvedPalette = isDaytime ? "still-paper" : "ikb-dark";
          const root = document.documentElement;
          if (root.getAttribute("data-palette") !== resolvedPalette) {
            applyPalette("auto-time");
          }
        }
      }, 60000);
    }

    // Expose API
    window.archvizTheme = {
      applyPalette,
      toggleTheme,
      getCurrentPalette,
      isDark,
      init,
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
